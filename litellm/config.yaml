# LiteLLM Proxy config — model_name entries must match the ids used in
# server/src/llm/routing.ts exactly; the proxy maps them to providers.
# Keys come from server/.env via docker-compose's env_file.

model_list:
  - model_name: claude-opus-4-8
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet-5
    litellm_params:
      model: anthropic/claude-sonnet-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
      # Gemini 2.5 thinks by default and reasoning eats the small per-task
      # maxTokens caps (design_resolution: 256) before any JSON is emitted.
      reasoning_effort: "disable"
      # BYOK (ADR-006): allow requests to override the key with the host's
      # own Gemini key; without the override the env key applies as before.
      configurable_clientside_auth_params: ["api_key"]

  - model_name: gpt-5.1
    litellm_params:
      model: openai/gpt-5.1
      api_key: os.environ/OPENAI_API_KEY
      # Same reasoning-vs-maxTokens concern as Gemini: keep reasoning off
      # so small output caps go to JSON, not thinking.
      reasoning_effort: "none"
      configurable_clientside_auth_params: ["api_key"]

  - model_name: gpt-5-mini
    litellm_params:
      model: openai/gpt-5-mini
      api_key: os.environ/OPENAI_API_KEY
      # gpt-5-mini has no "none" tier; minimal is its floor.
      reasoning_effort: "minimal"
      configurable_clientside_auth_params: ["api_key"]

  # Local Ollama on the host — free offline fallback for dev; the proxy
  # runs in Docker, so the host is host.docker.internal, not localhost.
  # Keep the model small: this machine (16GB RAM / 4GB GTX 1650) crashes
  # llama-server on big models — gemma4:e4b (9.6GB) dies with GGML_ASSERT.
  - model_name: gemma3-4b
    litellm_params:
      model: ollama_chat/gemma3:4b
      api_base: http://host.docker.internal:11434

  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY
      configurable_clientside_auth_params: ["api_key"]

litellm_settings:
  # Drop provider-specific params a target model doesn't support instead of
  # erroring — the gateway's zod validation still catches degraded output.
  drop_params: true
